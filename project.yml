name: MLXChat
options:
  bundleIdPrefix: org.mlxchat
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
packages:
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    exactVersion: 3.31.4
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.9.0
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.3.0
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.1
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: 2.3.0
  SwiftMath:
    url: https://github.com/mgriebling/SwiftMath
    from: 1.7.3
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
targets:
  MLXChat:
    type: application
    platform: macOS
    sources: [MLXChat]
    # A real Info.plist (not GENERATE_INFOPLIST_FILE) is needed so we can add
    # Sparkle's custom keys; the arbitrary `INFOPLIST_KEY_*` pass-through only
    # supports Apple's allow-listed keys. XcodeGen fills the standard CFBundle keys.
    info:
      path: MLXChat/Support/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: ""
        # Sparkle auto-update: the appcast is a GitHub Release asset on this repo
        # (latest/download always resolves to the newest release). SUPublicEDKey is
        # the app's public verification key — safe to commit.
        SUFeedURL: "https://github.com/abayomipopoola/mlx-chat/releases/latest/download/appcast.xml"
        SUPublicEDKey: "yzzKtSco8tZ2cWBQqqTCC0XGAnB9H2mJb6+U2gLHgrY="
        SUEnableInstallerLauncherService: true
    settings:
      base:
        PRODUCT_NAME: MLX Chat
        PRODUCT_MODULE_NAME: MLXChat
        PRODUCT_BUNDLE_IDENTIFIER: org.mlxchat.MLXChat
        MARKETING_VERSION: 1.0.2
        CURRENT_PROJECT_VERSION: 3
        SWIFT_VERSION: "5.0"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_ENTITLEMENTS: MLXChat/Support/MLXChat.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Release builds ad hoc by default, so anyone can build from source
        # without a developer account. To ship a NOTARIZED release, a
        # maintainer sets their own Developer ID identity and team here:
        #
        #   CODE_SIGN_IDENTITY: "Developer ID Application"
        #   DEVELOPMENT_TEAM: <your-10-char-team-id>
        #   ENABLE_HARDENED_RUNTIME: YES
        #   OTHER_CODE_SIGN_FLAGS: "--timestamp"
        #   # `xcodebuild build` injects get-task-allow (debugger attach)
        #   # even in Release; notarization rejects it. `archive` strips it,
        #   # a plain build needs this:
        #   CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        Release:
          CODE_SIGN_IDENTITY: "-"
    dependencies:
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: SwiftHuggingFace
        product: HuggingFace
      - package: SwiftTransformers
        product: Tokenizers
      - package: MarkdownUI
        product: MarkdownUI
      - package: Highlightr
        product: Highlightr
      - package: SwiftMath
        product: SwiftMath
      - package: Sparkle
        product: Sparkle
  MLXChatTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/MLXChatTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MLX Chat.app/Contents/MacOS/MLX Chat"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: MLXChat
schemes:
  MLXChat:
    build:
      targets:
        MLXChat: all
    run:
      config: Debug
    test:
      config: Debug
      targets: [MLXChatTests]
